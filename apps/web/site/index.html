<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Falling Fury</title>
    <meta
      name="description"
      content="Click falling targets, protect your health, and beat your high score."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hud">
        <h1>Falling Fury</h1>
        <p class="subtitle">Arcade mode for GitHub Pages</p>
        <div class="stats">
          <div class="stat-card">
            <span class="label">Health</span>
            <span id="health" class="value">10</span>
          </div>
          <div class="stat-card">
            <span class="label">Score</span>
            <span id="score" class="value">0</span>
          </div>
          <div class="stat-card">
            <span class="label">High Score</span>
            <span id="high-score" class="value">0</span>
          </div>
        </div>
      </section>

      <section class="arena-wrap">
        <canvas id="game-canvas" width="1000" height="700" aria-label="Game canvas"></canvas>
        <div id="game-over" class="game-over hidden">
          <h2>Game Over</h2>
          <p>Targets reached the floor. Tap restart and try again.</p>
          <button id="restart-btn" type="button">Restart</button>
        </div>
      </section>
    </main>

    <script>
      var Module = {
        canvas: (function() {
          var canvas = document.getElementById('game-canvas');
          canvas.addEventListener("webglcontextlost", function(e) { alert('WebGL context lost. You will need to reload the page.'); e.preventDefault(); }, false);
          return canvas;
        })()
      };
    </script>
    <script src="./FallingFuryWasm.js"></script>
  </body>
</html>
