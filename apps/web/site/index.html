<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Falling Fury</title>
    <meta
      name="description"
      content="Click falling targets before they hit the floor. Protect your health and beat your high score!"
    />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page" id="page">
      <header class="hud">
        <h1>Falling Fury</h1>
        <p class="subtitle">Click the falling targets before they escape!</p>
        <div class="stats">
          <div class="stat-card stat-health">
            <span class="label">Health</span>
            <span id="health" class="value">10</span>
          </div>
          <div class="stat-card stat-score">
            <span class="label">Score</span>
            <span id="score" class="value">0</span>
          </div>
          <div class="stat-card stat-high">
            <span class="label">High Score</span>
            <span id="high-score" class="value">0</span>
          </div>
        </div>
      </header>

      <section class="arena-wrap">
        <canvas id="game-canvas" width="780" height="460" aria-label="Game canvas"></canvas>
        <div id="game-over" class="game-over hidden">
          <h2>Game Over</h2>
          <p id="final-score-line">Your score: 0</p>
          <button id="restart-btn" type="button">Play Again</button>
        </div>
      </section>

      <footer class="footer">
        <p>Built with C++ &amp; WebAssembly &bull; <a href="https://github.com/tamimorif/Falling-Fury" target="_blank" rel="noopener">View Source</a></p>
      </footer>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
